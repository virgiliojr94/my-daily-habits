name: CI

# Roda a cada Pull Request pra main: é o "portão" que fica verde ou vermelho.
on:
  pull_request:
    branches: [ main ]

jobs:
  build-e-teste:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test          # se um teste falhar, o CI fica VERMELHO
      - run: npm run build      # garante que a app compila
